name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 12 * * *'  # runs every day at noon UTC
  workflow_dispatch:       # lets you trigger it manually too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://cxjhquprsmxkaqmznjfd.supabase.co/rest/v1/users?select=id&limit=1" \
            > /dev/null
          echo "Pinged Supabase at $(date)"
